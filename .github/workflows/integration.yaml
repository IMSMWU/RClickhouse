# Integration tests against a live ClickHouse exposing both the HTTP and the
# Arrow Flight SQL interfaces (started via docker-compose.yml). Runs the test
# suite once per transport.
on:
  push:
    branches: [v2-flight-sql]
  pull_request:
    branches: [v2-flight-sql]
  workflow_dispatch:

name: integration

jobs:
  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        transport: [http, flightsql]

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: "true"
      RCLICKHOUSE_TEST_TRANSPORT: ${{ matrix.transport }}

    steps:
      - uses: actions/checkout@v4

      - name: Start ClickHouse (HTTP + Arrow Flight SQL)
        run: |
          docker compose up -d
          echo "Waiting for ClickHouse HTTP..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8123/ping >/dev/null; then
              echo "ClickHouse is up"; break
            fi
            sleep 2
          done
          curl -s "http://localhost:8123/?query=SELECT%20version()"

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # The Flight SQL ADBC driver is built from Go sources on R-multiverse.
      - uses: actions/setup-go@v5
        if: matrix.transport == 'flightsql'
        with:
          go-version: 'stable'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat, any::pkgload, local::.
          needs: check

      - name: Install Flight SQL driver
        if: matrix.transport == 'flightsql'
        run: install.packages("adbcflightsql", repos = "https://community.r-multiverse.org")
        shell: Rscript {0}

      - name: Run tests (${{ matrix.transport }})
        run: |
          pkgload::load_all(".")
          out <- testthat::test_dir("tests/testthat", stop_on_failure = TRUE)
        shell: Rscript {0}

      - name: ClickHouse logs on failure
        if: failure()
        run: docker compose logs clickhouse | tail -n 100
