# Standard R CMD check across platforms. No ClickHouse server is available
# here, so integration tests skip themselves; this guards the package build,
# documentation, and unit tests. Integration tests run in integration.yaml.
on:
  push:
    branches: [master, v2-flight-sql]
  pull_request:
  workflow_dispatch:

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'devel'}
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # adbcflightsql (Suggests) is a Go-built ADBC driver from R-multiverse.
      # Provide Go so it can be installed where a binary is unavailable.
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
